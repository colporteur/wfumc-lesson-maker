<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>WFUMC Lesson Maker</title>
    <meta name="robots" content="noindex, nofollow" />
    <script type="text/javascript">
      // GitHub Pages SPA redirect: rewrites the path into a query string the
      // index.html script (in the <head>) can decode and replace into history.
      // Adapted from https://github.com/rafgraph/spa-github-pages
      var pathSegmentsToKeep = 1; // matches "/wfumc-lesson-maker/" repo prefix
      var l = window.location;
      l.replace(
        l.protocol +
          '//' +
          l.hostname +
          (l.port ? ':' + l.port : '') +
          l.pathname
            .split('/')
            .slice(0, 1 + pathSegmentsToKeep)
            .join('/') +
          '/?/' +
          l.pathname
            .slice(1)
            .split('/')
            .slice(pathSegmentsToKeep)
            .join('/')
            .replace(/&/g, '~and~') +
          (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash
      );
    </script>
  </head>
  <body></body>
</html>
